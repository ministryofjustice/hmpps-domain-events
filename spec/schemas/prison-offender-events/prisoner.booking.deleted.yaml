name: prison-offender-events.prisoner.booking.deleted
title: prison-offender-events.prisoner.booking.deleted
summary: A NOMIS booking has been deleted
description: |
  This is raised when a NOMIS booking is deleted typically as part of a entire prisoner recorded being deleted from NOMIS. However, that can be raised when just a NOMIS booking is deleted. Though the entities associated with the booking will be deleted which typically results in the NOMIS to DPS synchronisation is deleting the associated entities in DPS, DPS may also need to update entities on other bookings that were previously on an older booking which has now become current. This can affect DPS UI filters.
contentType: application/json
payload:
  type: object
  required: [additionalInformation, description, eventType, occurredAt, personReference, publishedAt, version]
  properties:
    additionalInformation:
      type: object
      required: [bookingId]
      properties:
        bookingId:
          type: string
          description: NOMIS booking id for the prisoner
          example: 1221642
    description:
      type: string
      const: a NOMIS booking has been deleted
    eventType:
      type: string
      const: prison-offender-events.prisoner.booking.deleted
    occurredAt:
      type: string
      description: The date and time the event occurred
      format: date-time
      example: '2024-10-11T16:39:45+01:00'
    personReference:
      type: object
      required: [identifiers]
      properties:
        identifiers:
          type: array
          items:
            - type: object
              required: [type, value]
              properties:
                type:
                  type: string
                  const: NOMS
                value:
                  type: string
                  pattern: '[A-Z][0-9]{4}[A-Z]{2}'
                  description: The prison number of the prisoner
                  example: A8491EA
    publishedAt:
      type: string
      description: The date and time the event was published
      format: date-time
      example: '2024-10-11T16:39:46.084397661+01:00'
    version:
      type: integer
      description: Version of this event message. Currently 1
      example: 1
