name: prison-offender-events.prisoner.dietary.information.updated
title: prison-offender-events.prisoner.dietary.information.updated
summary: A prisoner's dietary information has been created or updated.
description: |
  Produced whenever any of the following health and medication fields is updated for a prisoner:
    <ul>
      <li><b>MEDICAL_DIET</b></li>
      <li><b>PERSONALISED_DIET</b></li>
      <li><b>FOOD_ALLERGY</b></li>
      <li><b>CATERING_INSTRUCTIONS</b></li>
    </ul>
  The specific field(s) that have been updated are not included; consumers will need to retrieve
  the prisoner's entire health and medication information to determine which field(s) were updated.
contentType: application/json
payload:
  type: object
  required: [ additionalInformation, description, detailUrl, eventType, occurredAt, personReference, version ]
  properties:
    additionalInformation:
      type: object
      required: [ nomsNumber ]
      properties:
        nomsNumber:
          type: string
          pattern: '[A-Z][0-9]{4}[A-Z]{2}'
          description: The prison number of the prisoner
          example: A1234AA
    description:
      type: string
      example: 'A prisoner had their dietary information created or updated.'
    detailUrl:
      type: string
      example: https://health-and-medication-api-dev.hmpps.service.justice.gov.uk/prisoners/A1234AA
    eventType:
      type: string
      example: prison-offender-events.prisoner.dietary.information.updated
    occurredAt:
      description: Timestamp of when the event occurred.
      type: string
      example: '2026-04-14T10:00:00.000000000+01:00'
    personReference:
      type: object
      required: [ identifiers ]
      properties:
        identifiers:
          type: array
          items:
            - type: object
              required: [ type, value ]
              properties:
                type:
                  type: string
                  const: NOMS
                value:
                  type: string
                  pattern: '[A-Z][0-9]{4}[A-Z]{2}'
                  description: The prison number of the prisoner
                  example: A1234AA
    version:
      type: integer
      description: Version of this event message; currently 1
      example: 1
